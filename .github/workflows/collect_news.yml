name: 🤖 AI 트렌드 — 일간 뉴스 자동 수집

on:
  schedule:
    - cron: '0 22 * * *'   # 매일 22:00 UTC = 07:00 KST
  workflow_dispatch:        # 수동 실행 허용

permissions:
  contents: write           # data/ 폴더 커밋에 필요

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. 저장소 체크아웃 ───────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0       # 전체 히스토리 (날짜별 파일 보존)

      # ── 2. Python 설정 ───────────────────────────────
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. 의존성 설치 ────────────────────────────────
      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. data/history 폴더 확보 ────────────────────
      - name: 📁 Ensure data/history directory
        run: |
          mkdir -p data/history
          # .gitkeep 이 없으면 생성 (빈 폴더 추적용)
          [ -f data/history/.gitkeep ] || touch data/history/.gitkeep

      # ── 5. AI 뉴스 수집 ──────────────────────────────
      - name: 📡 Collect AI news (B-mode: daily snapshot + weekly/monthly)
        run: python fetch_ai_news.py
        env:
          TZ: Asia/Seoul

      # ── 6. 변경 파일 커밋 & 푸시 ─────────────────────
      - name: 💾 Commit & push data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 변경된 data/ 파일 전체 스테이징
          git add data/

          # 변경사항이 없으면 커밋 생략
          if git diff --cached --quiet; then
            echo "변경사항 없음 — 커밋 생략"
          else
            TODAY=$(TZ='Asia/Seoul' date '+%Y-%m-%d')
            git commit -m "🤖 [Auto] AI 트렌드 업데이트 ${TODAY} (일간+주간+월간)"
            git push
            echo "✅ 데이터 파일 push 완료"
          fi
