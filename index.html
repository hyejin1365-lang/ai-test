<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 트렌드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header id="siteHeader">
  <!-- 제목 행 -->
  <div class="header-row">
    <h1>AI 트렌드</h1>
    <div class="header-actions">
      <button class="hd-btn" id="themeBtn" title="라이트/다크모드">☀️</button>
    </div>
  </div>

  <!-- 수집 정보 -->
  <div class="collect-info" id="updateTime">로딩 중…</div>

  <!-- 필터 영역 -->
  <div class="filters">

    <!-- 소스 탭 -->
    <div class="filter-group">
      <label>소스</label>
      <div class="filter-tabs" id="sourceTabs">
        <button class="active" data-source="all" onclick="selectSource('all',this)">전체</button>
      </div>
    </div>

    <!-- 기간 / 분류 / 정렬 / 마이너 / 보기 -->
    <div class="filter-inline-row">
      <div class="filter-group">
        <label>기간</label>
        <select id="daysFilter" onchange="applyFilters()">
          <option value="1">오늘</option>
          <option value="7" selected>이번주</option>
          <option value="30">이번달</option>
          <option value="365">전체</option>
        </select>
      </div>

      <div class="filter-group">
        <label>분류</label>
        <select id="categoryFilter" onchange="applyFilters()">
          <option value="all">전체</option>
          <option value="모델출시">모델출시</option>
          <option value="API변경">API변경</option>
          <option value="기능추가">기능추가</option>
          <option value="가격변경">가격변경</option>
          <option value="도구출시">도구출시</option>
        </select>
      </div>

      <div class="filter-group">
        <label>정렬</label>
        <select id="sortFilter" onchange="applyFilters()">
          <option value="date">최신순</option>
          <option value="heat">관심도순 🔥</option>
        </select>
      </div>

      <label class="minor-toggle">
        <input type="checkbox" id="showMinor" onchange="applyFilters()">
        마이너 포함
      </label>

      <div class="view-group">
        <label>보기</label>
        <div class="view-btns">
          <button class="view-btn active" id="btnCard">📋 카드</button>
          <button class="view-btn" id="btnList">📝 리스트</button>
        </div>
      </div>
    </div>

  </div>
</header>

<main id="mainArea">
  <div id="loadingWrap" class="loading-wrap">
    <div class="spinner"></div>
    <span>데이터 불러오는 중…</span>
  </div>
  <div id="errorWrap" class="error-wrap" style="display:none">
    <span>⚠️</span>
    <p id="errorMsg">데이터를 불러오지 못했어요.</p>
  </div>
  <div id="updatesList"></div>
</main>

<footer class="site-footer">
  AI 트렌드 · 매일 자동 수집 · RSS + 공식 Changelog
</footer>

<script src="app.js"></script>
</body>
</html>
