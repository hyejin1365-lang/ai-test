<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 트렌드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: rgba(0,0,0,0.09);
    --border-strong: rgba(0,0,0,0.18);
    --text: #1a1916;
    --text-sub: #6b6960;
    --text-hint: #9e9b93;
    --accent: #5548d9;
    --accent-bg: #eeedfe;
    --accent-text: #3c3489;
    --hot: #d85a30;
    --hot-bg: #faece7;
    --hot-text: #712b13;
    --star-bg: #faeeda;
    --star-text: #633806;
    --teal: #1d9e75;
    --teal-bg: #e1f5ee;
    --teal-text: #085041;
    --font: 'Pretendard', -apple-system, sans-serif;
    --mono: 'DM Mono', monospace;
    --r-sm: 6px;
    --r-md: 10px;
    --r-lg: 14px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── 헤더 ──────────────────────────────── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 52px;
    gap: 16px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    text-decoration: none;
  }
  .logo-mark {
    width: 24px; height: 24px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-mark svg { width: 14px; height: 14px; fill: #fff; }
  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .live-badge {
    font-size: 11px;
    font-weight: 600;
    color: var(--teal-text);
    background: var(--teal-bg);
    border-radius: 20px;
    padding: 3px 10px;
    letter-spacing: .02em;
  }
  .date-label {
    font-size: 12px;
    color: var(--text-hint);
    font-family: var(--mono);
  }

  /* ── 탭 네비게이션 ─────────────────────── */
  .tab-nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }
  .tab-nav-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    gap: 0;
  }
  .tab-btn {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-sub);
    padding: 12px 16px;
    border: none;
    background: none;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color .15s, border-color .15s;
    white-space: nowrap;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* ── 레이아웃 ──────────────────────────── */
  .page { max-width: 1100px; margin: 0 auto; padding: 24px; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── 오늘 탭 레이아웃 ──────────────────── */
  .daily-layout {
    display: grid;
    grid-template-columns: minmax(0,1fr) 300px;
    gap: 20px;
    align-items: start;
  }
  @media(max-width:800px) {
    .daily-layout { grid-template-columns: 1fr; }
    .sidebar { order: -1; }
  }

  /* ── 요약 박스 ─────────────────────────── */
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 16px 18px;
    margin-bottom: 16px;
  }
  .summary-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .07em;
    color: var(--text-hint);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .insight-list { list-style: none; }
  .insight-list li {
    font-size: 13px;
    color: var(--text);
    padding: 5px 0;
    display: flex;
    gap: 8px;
    line-height: 1.55;
  }
  .insight-list li::before {
    content: '';
    width: 5px; height: 5px;
    background: var(--accent);
    border-radius: 50%;
    margin-top: 7px;
    flex-shrink: 0;
  }
  .prose-text {
    font-size: 13px;
    color: var(--text-sub);
    line-height: 1.7;
  }

  /* ── 필터 행 ───────────────────────────── */
  .filter-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 14px;
    align-items: center;
  }
  .filter-label { font-size: 12px; color: var(--text-hint); }
  .filter-chip {
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border-strong);
    cursor: pointer;
    color: var(--text-sub);
    background: var(--surface);
    transition: all .15s;
    font-family: var(--font);
  }
  .filter-chip:hover { border-color: var(--accent); color: var(--accent); }
  .filter-chip.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* ── 카드 그리드 ───────────────────────── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }

  /* ── 뉴스 카드 ─────────────────────────── */
  .news-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: border-color .15s, transform .1s;
  }
  .news-card:hover {
    border-color: var(--border-strong);
    transform: translateY(-1px);
  }
  .card-thumb {
    height: 96px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 14px;
    flex-shrink: 0;
  }
  .card-thumb-inner { text-align: center; }
  .card-keyword {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 5px;
  }
  .card-sub-text {
    font-size: 11px;
    color: var(--text-sub);
    line-height: 1.4;
  }
  .card-body {
    padding: 10px 12px;
    border-top: 1px solid var(--border);
  }
  .card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }
  .cat-tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 600;
    white-space: nowrap;
  }
  .cat-model   { background: var(--accent-bg); color: var(--accent-text); }
  .cat-tool    { background: var(--teal-bg);   color: var(--teal-text); }
  .cat-content { background: var(--star-bg);   color: var(--star-text); }
  .cat-api     { background: var(--hot-bg);    color: var(--hot-text); }
  .cat-paper   { background: #eaf3de;           color: #27500a; }
  .card-source { font-size: 11px; color: var(--text-hint); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .imp-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .imp-hot  { background: var(--hot-bg); color: var(--hot-text); }
  .imp-star { background: var(--star-bg); color: var(--star-text); }
  .imp-new  { background: var(--surface2); color: var(--text-hint); }

  /* ── 영상 토글 ─────────────────────────── */
  .toggle-wrap { border-top: 1px solid var(--border); }
  .toggle-btn {
    width: 100%;
    font-size: 11px;
    color: var(--text-hint);
    padding: 7px 12px;
    background: var(--surface2);
    border: none;
    cursor: pointer;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: var(--font);
    transition: background .1s;
  }
  .toggle-btn:hover { background: var(--border); color: var(--text-sub); }
  .toggle-arrow { font-size: 9px; transition: transform .2s; display: inline-block; }
  .toggle-arrow.open { transform: rotate(90deg); }
  .toggle-video {
    display: none;
    padding: 10px 12px;
    border-top: 1px solid var(--border);
    background: var(--surface2);
  }
  .video-thumb {
    width: 100%; height: 64px;
    background: #d3d1c7;
    border-radius: var(--r-sm);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    position: relative;
    text-decoration: none;
  }
  .play-btn {
    width: 28px; height: 28px;
    background: rgba(0,0,0,.55);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .play-btn::after {
    content: '';
    width: 0; height: 0;
    border-top: 6px solid transparent;
    border-bottom: 6px solid transparent;
    border-left: 11px solid #fff;
    margin-left: 2px;
  }
  .video-title { font-size: 11px; color: var(--text-sub); margin-top: 6px; }

  /* ── 사이드바 ──────────────────────────── */
  .sidebar-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 14px 16px;
    margin-bottom: 12px;
  }
  .sidebar-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .06em;
    color: var(--text-hint);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 8px;
    margin-bottom: 0;
  }
  .stat-cell {
    background: var(--surface2);
    border-radius: var(--r-sm);
    padding: 8px 10px;
    text-align: center;
  }
  .stat-num { font-size: 20px; font-weight: 600; color: var(--text); }
  .stat-lbl { font-size: 10px; color: var(--text-hint); margin-top: 1px; }

  .keyword-list { display: flex; flex-wrap: wrap; gap: 5px; }
  .kw-chip {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-sub);
    display: flex; align-items: center; gap: 4px;
  }
  .kw-count {
    font-size: 10px;
    font-weight: 600;
    color: var(--accent);
    font-family: var(--mono);
  }

  .source-list { display: flex; flex-direction: column; gap: 5px; }
  .source-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
  }
  .source-name { color: var(--text-sub); }
  .source-count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-hint);
    background: var(--surface2);
    padding: 1px 6px;
    border-radius: 4px;
  }

  /* ── 주간/월간 공통 ────────────────────── */
  .period-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .period-stats {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .period-stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 14px 16px;
    text-align: center;
  }
  .period-stat-num {
    font-size: 26px;
    font-weight: 600;
    color: var(--text);
    font-family: var(--mono);
  }
  .period-stat-lbl { font-size: 11px; color: var(--text-hint); margin-top: 3px; }

  /* ── 리포트 카드 ───────────────────────── */
  .report-list { display: flex; flex-direction: column; gap: 10px; }
  .report-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 14px 16px;
  }
  .report-card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .report-card-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .report-badge-latest {
    font-size: 10px; font-weight: 600;
    background: var(--accent-bg); color: var(--accent-text);
    border-radius: 20px; padding: 2px 8px;
  }
  .report-desc {
    font-size: 12px;
    color: var(--text-sub);
    line-height: 1.65;
    margin-bottom: 10px;
  }
  .report-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
  .report-tag {
    font-size: 11px;
    color: var(--text-hint);
    background: var(--surface2);
    padding: 2px 8px;
    border-radius: 20px;
  }
  .report-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .report-date { font-size: 11px; color: var(--text-hint); font-family: var(--mono); }
  .report-open-btn {
    font-size: 11px;
    color: var(--accent);
    background: none;
    border: 1px solid var(--accent-bg);
    padding: 4px 10px;
    border-radius: var(--r-sm);
    cursor: pointer;
    font-family: var(--font);
    transition: background .1s;
  }
  .report-open-btn:hover { background: var(--accent-bg); }

  /* ── 트렌드 바 ─────────────────────────── */
  .trend-bars { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
  .trend-bar-row {}
  .trend-bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 5px;
  }
  .trend-bar-name { color: var(--text-sub); }
  .trend-bar-val { font-weight: 600; font-family: var(--mono); font-size: 11px; }
  .trend-bar-bg {
    height: 7px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
  }
  .trend-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width .8s ease;
  }

  /* ── 카테고리 변화 그리드 ──────────────── */
  .change-grid {
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 8px;
  }
  .change-cell {
    background: var(--surface2);
    border-radius: var(--r-md);
    padding: 12px 14px;
  }
  .change-cat { font-size: 11px; color: var(--text-hint); margin-bottom: 3px; }
  .change-pct { font-size: 20px; font-weight: 600; color: var(--text); font-family: var(--mono); }
  .change-delta { font-size: 11px; margin-top: 2px; }
  .delta-up   { color: var(--teal); }
  .delta-down { color: var(--hot); }
  .delta-flat { color: var(--text-hint); }

  /* ── 섹션 제목 ─────────────────────────── */
  .sec-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 10px;
    margin-top: 20px;
  }
  .sec-title:first-child { margin-top: 0; }

  /* ── 분야별 대표 소식 ──────────────────── */
  .cat-highlight-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 10px;
    margin-bottom: 20px;
  }
  .cat-highlight-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 12px 14px;
  }
  .cat-highlight-cat {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-hint);
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: 5px;
  }
  .cat-highlight-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 5px;
  }
  .cat-highlight-desc {
    font-size: 11px;
    color: var(--text-sub);
    line-height: 1.5;
  }
  .cat-highlight-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }
  .cat-highlight-src { font-size: 11px; color: var(--text-hint); }
  .cat-highlight-link {
    font-size: 11px;
    color: var(--accent);
    text-decoration: none;
  }
  .cat-highlight-link:hover { text-decoration: underline; }

  /* ── HOT 뉴스 리스트 ───────────────────── */
  .hot-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
  .hot-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 10px 14px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .hot-rank {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-hint);
    font-family: var(--mono);
    min-width: 20px;
    flex-shrink: 0;
  }
  .hot-content { flex: 1; min-width: 0; }
  .hot-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 3px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .hot-meta { font-size: 11px; color: var(--text-hint); }

  /* ── 리포트 모달 ───────────────────────── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.4);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: var(--r-lg);
    width: 100%;
    max-width: 680px;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,.15);
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
    background: var(--surface);
  }
  .modal-title { font-size: 15px; font-weight: 600; }
  .modal-close {
    width: 28px; height: 28px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    color: var(--text-sub);
    font-family: var(--font);
  }
  .modal-body { padding: 20px; }

  /* ── 로딩 ──────────────────────────────── */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    gap: 12px;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--border-strong);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--text-hint); }

  /* ── 에러 ──────────────────────────────── */
  .error-box {
    background: var(--hot-bg);
    border: 1px solid #f0997b;
    border-radius: var(--r-md);
    padding: 14px 16px;
    font-size: 13px;
    color: var(--hot-text);
  }

  /* ── 빈 상태 ───────────────────────────── */
  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-hint);
    font-size: 13px;
  }

  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  /* ── 스크롤바 ──────────────────────────── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
</style>
</head>
<body>

<!-- ── 헤더 ──────────────────────────────── -->
<header class="header">
  <div class="header-inner">
    <a class="logo" href="#">
      <div class="logo-mark">
        <svg viewBox="0 0 14 14"><path d="M7 1L9 5H13L10 8L11 12L7 9.5L3 12L4 8L1 5H5L7 1Z"/></svg>
      </div>
      AI 트렌드
    </a>
    <div class="header-right">
      <span class="live-badge" id="liveBadge">LIVE</span>
      <span class="date-label" id="todayLabel"></span>
    </div>
  </div>
</header>

<!-- ── 탭 네비게이션 ─────────────────────── -->
<nav class="tab-nav">
  <div class="tab-nav-inner">
    <button class="tab-btn active" onclick="switchTab('daily',this)">오늘의 AI</button>
    <button class="tab-btn" onclick="switchTab('weekly',this)">주간 리포트</button>
    <button class="tab-btn" onclick="switchTab('monthly',this)">월간 인사이트</button>
    <button class="tab-btn" onclick="switchTab('trend',this)">트렌드 흐름</button>
  </div>
</nav>

<!-- ── 메인 콘텐츠 ──────────────────────── -->
<main class="page">

  <!-- ══════════════════════════════════════ -->
  <!-- 오늘의 AI 탭                           -->
  <!-- ══════════════════════════════════════ -->
  <div class="tab-panel active" id="panel-daily">

      <!-- 왼쪽: 카드 피드 -->

          <button class="filter-chip" onclick="filterCards(this,'개발AI')">도구·기능</button>

  <!-- ══════════════════════════════════════ -->

  <div class="tab-panel" id="panel-weekly">
    <div id="weeklyContent">
      <div class="loading"><div class="spinner"></div><span class="loading-text">주간 리포트 불러오는 중…</span></div>
    </div>
  </div>

  <!-- ══════════════════════════════════════ -->
  <!-- 월간 인사이트 탭                       -->

    <div id="monthlyContent">
      <div class="loading"><div class="spinner"></div><span class="loading-text">월간 인사이트 불러오는 중…</span></div>
    </div>

  <!-- ══════════════════════════════════════ -->
  <!-- 트렌드 흐름 탭 (신규)                  -->

  <div class="tab-panel" id="panel-trend">
    <div id="trendContent">
      <div class="loading"><div class="spinner"></div><span class="loading-text">트렌드 데이터 불러오는 중…</span></div>

<!-- ── 리포트 모달 ──────────────────────── -->
<div class="modal-overlay" id="reportModal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle"></span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// 상수 & 상태
// ═══════════════════════════════════════════
const DATA_ROOT = 'data/';
let state = { daily: null, weekly: null, monthly: null };
let currentFilter = 'all';

// ═══════════════════════════════════════════
// 초기화
// ═══════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  // 날짜 표시
  const now = new Date();
  document.getElementById('todayLabel').textContent =
    now.toLocaleDateString('ko-KR', { year:'numeric', month:'2-digit', day:'2-digit' })
       .replace(/\. /g,'.').replace('.','.').slice(0,-1);

  loadDaily();
});

// ═══════════════════════════════════════════
// 탭 전환
// ═══════════════════════════════════════════
function switchTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  btn.classList.add('active');

  if (id === 'weekly'  && !state.weekly)  loadWeekly();
  if (id === 'monthly' && !state.monthly) loadMonthly();
  if (id === 'trend'   && !state.weekly)  loadWeekly().then(renderTrend);
  if (id === 'trend'   &&  state.weekly)  renderTrend();
}

// ═══════════════════════════════════════════
// 데이터 로드
// ═══════════════════════════════════════════
async function fetchJSON(path) {
  const r = await fetch(path + '?t=' + Date.now());
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

async function loadDaily() {
  try {
    const data = await fetchJSON(DATA_ROOT + 'ai_news.json');
    state.daily = data;
    renderDailySummary(data);
    renderCards(data.items || []);
    renderSidebar(data);
  } catch(e) {
    document.getElementById('dailySummaryBox').innerHTML =
      `<div class="error-box">데이터를 불러오지 못했어요. (${e.message})<br>GitHub Actions가 실행된 후 새로고침 해주세요.</div>`;
    document.getElementById('cardsGrid').innerHTML = '';
  }
}

async function loadWeekly() {
  try {
    const data = await fetchJSON(DATA_ROOT + 'weekly.json');
    state.weekly = data;
    renderPeriod('weekly', data);
    return data;
  } catch(e) {
    document.getElementById('weeklyContent').innerHTML =
      `<div class="error-box">주간 데이터를 불러오지 못했어요. (${e.message})</div>`;
  }
}

async function loadMonthly() {
  try {
    const data = await fetchJSON(DATA_ROOT + 'monthly.json');
    state.monthly = data;
    renderPeriod('monthly', data);
  } catch(e) {
    document.getElementById('monthlyContent').innerHTML =
      `<div class="error-box">월간 데이터를 불러오지 못했어요. (${e.message})</div>`;
  }
}

// ═══════════════════════════════════════════
// 오늘 요약 렌더
// ═══════════════════════════════════════════
function renderDailySummary(data) {
  const s = data.daily_summary || {};
  const kps = s.key_points || [];
  const box = document.getElementById('dailySummaryBox');

  // 통계
  document.getElementById('statTotal').textContent = data.total || 0;
  document.getElementById('statKr').textContent = s.kr_count || 0;
  document.getElementById('statEn').textContent = s.en_count || 0;

  if (!kps.length) {
    box.innerHTML = `<div class="summary-label">오늘의 핵심 인사이트</div><div class="prose-text">${s.prose || '오늘 수집된 뉴스가 없습니다.'}</div>`;
    return;
  }

  box.innerHTML = `
    <div class="summary-label">오늘의 핵심 인사이트</div>
    <ul class="insight-list">
      ${kps.map(k => `<li>${escHtml(k)}</li>`).join('')}
    </ul>
    ${s.prose ? `<div class="prose-text" style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">${escHtml(s.prose)}</div>` : ''}
  `;
}

// ═══════════════════════════════════════════
// 카드 렌더
// ═══════════════════════════════════════════
const CAT_COLORS = {
  'LLM':            ['cat-model',   '모델·LLM'],
  '개발AI':         ['cat-tool',    '도구·기능'],
  '영상AI':         ['cat-content', 'AI 콘텐츠'],
  '이미지·디자인AI':['cat-content', '이미지·디자인'],
  '콘텐츠':         ['cat-api',     '국내 뉴스'],
  '논문':           ['cat-paper',   '논문'],
  'AI법률':         ['cat-paper',   'AI 법률'],
  '비즈니스':       ['cat-model',   '비즈니스'],
};

const THUMB_COLORS = {
  'LLM':            '#f0eff9',
  '개발AI':         '#e4f8f1',
  '영상AI':         '#fef6e8',
  '이미지·디자인AI':'#faece7',
  '콘텐츠':         '#eef4ff',
  '논문':           '#eaf3de',
  'AI법률':         '#fbeaf0',
  '비즈니스':       '#f7f6f3',
};

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function impBadge(imp) {
  if (!imp) return '';
  const cls = imp.class === 'hot' ? 'imp-hot' : imp.class === 'star' ? 'imp-star' : 'imp-new';
  return `<span class="imp-badge ${cls}">${escHtml(imp.label)}</span>`;
}

function buildCard(item) {
  const [catCls, catLabel] = CAT_COLORS[item.category] || ['cat-paper', item.category];
  const thumbBg = THUMB_COLORS[item.category] || '#f7f6f3';
  const keyword = item.one_line_kr || item.one_line || item.title;
  const sub = (item.source || '') + (item.date ? ' · ' + item.date.slice(0,10) : '');
  const hasVideo = item.video_url;

  return `
    <div class="news-card" data-cat="${escHtml(item.category)}">
      <a href="${escHtml(item.url||'#')}" target="_blank" rel="noopener" style="text-decoration:none">
        <div class="card-thumb" style="background:${thumbBg}">
          <div class="card-thumb-inner">
            <div class="card-keyword">${escHtml(keyword.slice(0,60))}</div>
            <div class="card-sub-text">${escHtml((item.title||'').slice(0,50))}</div>
          </div>
        </div>
      </a>
      <div class="card-body">
        <div class="card-meta">
          <span class="cat-tag ${catCls}">${catLabel}</span>
          ${impBadge(item.importance)}
        </div>
        <div class="card-source" style="margin-top:4px">${escHtml(sub)}</div>
      </div>
      <div class="toggle-wrap">
        <button class="toggle-btn" onclick="toggleVideo(this)">
          <span class="toggle-arrow">▶</span>
          ${hasVideo ? '관련 영상 보기' : '관련 영상 없음'}
        </button>
        <div class="toggle-video">
          ${hasVideo
            ? `<a href="${escHtml(item.video_url)}" target="_blank" class="video-thumb"><div class="play-btn"></div></a>
               <div class="video-title">${escHtml(item.video_title||'관련 영상')}</div>`
            : `<div class="video-thumb" style="cursor:default;background:#e8e6e0">
                 <span style="font-size:11px;color:var(--text-hint)">영상 없음</span>
               </div>
               <div class="video-title">이 뉴스의 관련 영상이 아직 없어요</div>`
          }
        </div>
      </div>
    </div>`;
}

function renderCards(items) {
  const grid = document.getElementById('cardsGrid');
  if (!items || !items.length) {
    grid.innerHTML = '<div class="empty-state">오늘 수집된 뉴스가 없어요.</div>';
    return;
  }
  // 중요도순 정렬
  const sorted = [...items].sort((a,b) => {
    const order = {hot:0, star:1, new:2};
    return (order[(a.importance||{}).class]||2) - (order[(b.importance||{}).class]||2);
  });
  grid.innerHTML = sorted.slice(0, 60).map(buildCard).join('');
}

function filterCards(btn, cat) {
  currentFilter = cat;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('#cardsGrid .news-card').forEach(card => {
    card.style.display = (cat === 'all' || card.dataset.cat === cat) ? '' : 'none';
  });
}

// ═══════════════════════════════════════════
// 영상 토글
// ═══════════════════════════════════════════
function toggleVideo(btn) {
  const wrap = btn.nextElementSibling;
  const arrow = btn.querySelector('.toggle-arrow');
  const isOpen = wrap.style.display === 'block';
  wrap.style.display = isOpen ? 'none' : 'block';
  arrow.classList.toggle('open', !isOpen);
  const hasVideo = wrap.querySelector('a.video-thumb');
  btn.innerHTML = `<span class="toggle-arrow${!isOpen?' open':''}">▶</span> ${
    isOpen ? (hasVideo?'관련 영상 보기':'관련 영상 없음') : '영상 닫기'
  }`;
}

// ═══════════════════════════════════════════
// 사이드바
// ═══════════════════════════════════════════
function renderSidebar(data) {
  // 키워드
  const kws = data.keywords || [];
  const kwEl = document.getElementById('kwList');
  if (kws.length) {
    kwEl.innerHTML = kws.slice(0,12).map(k =>
      `<div class="kw-chip">${escHtml(k.keyword)} <span class="kw-count">${k.count}</span></div>`
    ).join('');
  } else {
    kwEl.innerHTML = '<span style="font-size:12px;color:var(--text-hint)">데이터 없음</span>';
  }

  // 소스
  const srcs = data.source_stats || [];
  const srcEl = document.getElementById('sourceList');
  if (srcs.length) {
    srcEl.innerHTML = srcs.slice(0,10).map(s =>
      `<div class="source-row">
        <span class="source-name">${escHtml(s.source)}</span>
        <span class="source-count">${s.count}</span>
      </div>`
    ).join('');
  } else {
    srcEl.innerHTML = '<span style="font-size:12px;color:var(--text-hint)">데이터 없음</span>';
  }
}

// ═══════════════════════════════════════════
// 주간·월간 공통 렌더
// ═══════════════════════════════════════════
function renderPeriod(type, data) {
  const el = document.getElementById(type === 'weekly' ? 'weeklyContent' : 'monthlyContent');
  const isWeekly = type === 'weekly';
  const label = isWeekly ? '주간' : '월간';
  const kps = data.period_key_points || [];
  const catHL = data.cat_highlights || {};
  const highlights = data.content_highlights || [];
  const kws = data.keywords || [];

  // 주간: 누적 리포트 목록은 history 파일 목록으로 표시
  let html = `
    <!-- 기간 통계 -->
    <div class="period-stats">
      <div class="period-stat">
        <div class="period-stat-num">${data.total||0}</div>
        <div class="period-stat-lbl">${data.days||0}일간 수집</div>
      </div>
      <div class="period-stat">
        <div class="period-stat-num">${data.kr_count||0}</div>
        <div class="period-stat-lbl">국내 기사</div>
      </div>
      <div class="period-stat">
        <div class="period-stat-num">${Object.keys(data.category_stats||{}).length}</div>
        <div class="period-stat-lbl">카테고리</div>
      </div>
    </div>

    <!-- 핵심 인사이트 -->
    <div class="sec-title">이번 ${label} 핵심 인사이트</div>
    <div class="summary-card" style="margin-bottom:20px">
      ${kps.length
        ? `<ul class="insight-list">${kps.map(k=>`<li>${escHtml(k)}</li>`).join('')}</ul>`
        : `<div class="prose-text">${escHtml(data.period_prose||'인사이트 데이터가 없습니다.')}</div>`
      }
    </div>`;

  // 분야별 대표 소식
  if (Object.keys(catHL).length) {
    html += `<div class="sec-title">분야별 대표 소식</div>
    <div class="cat-highlight-grid">
      ${Object.entries(catHL).map(([cat, item]) => `
        <div class="cat-highlight-card">
          <div class="cat-highlight-cat">${escHtml(cat)}</div>
          <div class="cat-highlight-title">${escHtml((item.title||'').slice(0,60))}</div>
          <div class="cat-highlight-desc">${escHtml((item.one_line||'').slice(0,80))}</div>
          <div class="cat-highlight-meta">
            <span class="cat-highlight-src">${escHtml(item.source||'')}</span>
            ${item.url ? `<a class="cat-highlight-link" href="${escHtml(item.url)}" target="_blank">원문 →</a>` : ''}
          </div>
        </div>`).join('')}
    </div>`;
  }

  // 주목 뉴스
  if (highlights.length) {
    const topN = isWeekly ? 6 : 10;
    html += `<div class="sec-title">이번 ${label} 주목 뉴스 TOP ${topN}</div>
    <div class="hot-list">
      ${highlights.slice(0, topN).map((item, i) => `
        <div class="hot-item">
          <div class="hot-rank">${String(i+1).padStart(2,'0')}</div>
          <div class="hot-content">
            <div class="hot-title">${escHtml(item.title||'')}</div>
            <div class="hot-meta">${escHtml(item.source||'')} · ${escHtml((item.date||'').slice(0,10))}</div>
          </div>
          ${item.url ? `<a href="${escHtml(item.url)}" target="_blank" style="font-size:11px;color:var(--accent);text-decoration:none;white-space:nowrap">→</a>` : ''}
        </div>`).join('')}
    </div>`;
  }

  // 분야별 수집 비율 (바 차트)
  const catStats = data.category_stats || {};
  const total = Object.values(catStats).reduce((a,b)=>a+b,0) || 1;
  const barColors = {
    'LLM':'#5548d9','개발AI':'#1d9e75','영상AI':'#ef9f27',
    '이미지·디자인AI':'#d85a30','콘텐츠':'#d4537e','논문':'#639922',
    'AI법률':'#ba7517','비즈니스':'#888780'
  };
  if (Object.keys(catStats).length) {
    html += `<div class="sec-title">분야별 수집 비율</div>
    <div class="trend-bars">
      ${Object.entries(catStats).sort((a,b)=>b[1]-a[1]).map(([cat, cnt]) => {
        const pct = Math.round(cnt/total*100);
        const color = barColors[cat] || '#888780';
        return `
          <div class="trend-bar-row">
            <div class="trend-bar-label">
              <span class="trend-bar-name">${escHtml(cat)}</span>
              <span class="trend-bar-val" style="color:${color}">${pct}%</span>
            </div>
            <div class="trend-bar-bg">
              <div class="trend-bar-fill" style="width:${pct}%;background:${color}"></div>
            </div>
          </div>`;
      }).join('')}
    </div>`;
  }

  // 핵심 키워드
  if (kws.length) {
    html += `<div class="sec-title">이번 ${label} 핵심 키워드</div>
    <div class="keyword-list" style="margin-bottom:20px">
      ${kws.slice(0,15).map(k=>
        `<div class="kw-chip">${escHtml(k.keyword)} <span class="kw-count">${k.count}</span></div>`
      ).join('')}
    </div>`;
  }

  // 주간: 누적 리포트 섹션 (history 기반)
  if (isWeekly) {
    html += buildWeeklyArchive();
  }

  el.innerHTML = html;
}

// 주간 누적 리포트 카드 목록 (history JSON 기반)
function buildWeeklyArchive() {
  if (!state.weekly) return '';
  const timeline = state.weekly.daily_timeline || [];
  if (!timeline.length) return '';

  // 7일치 날짜를 주 단위로 묶어 표시
  return `
    <div class="divider"></div>
    <div class="sec-title">누적 주간 기록</div>
    <div class="report-list">
      ${timeline.slice().reverse().slice(0,4).map((day, i) => `
        <div class="report-card">
          <div class="report-card-head">
            <div class="report-card-title">${escHtml(day.date)} 수집 현황</div>
            ${i===0?'<span class="report-badge-latest">최신</span>':''}
          </div>
          <div class="report-desc">이 날 총 <strong>${day.count}</strong>건의 AI 뉴스가 수집됐습니다.</div>
          <div class="report-footer">
            <span class="report-date">${escHtml(day.date)}</span>
            <button class="report-open-btn" onclick="openDayReport('${escHtml(day.date)}')">상세 보기</button>
          </div>
        </div>`).join('')}
    </div>`;
}

// ═══════════════════════════════════════════
// 트렌드 흐름 탭 렌더
// ═══════════════════════════════════════════
function renderTrend() {
  const data = state.weekly;
  const el = document.getElementById('trendContent');
  if (!data) {
    el.innerHTML = '<div class="error-box">주간 데이터가 없어요.</div>';
    return;
  }

  const catStats = data.category_stats || {};
  const monthly  = state.monthly;
  const monthCat = monthly ? (monthly.category_stats || {}) : {};
  const total    = Object.values(catStats).reduce((a,b)=>a+b,0) || 1;
  const mTotal   = Object.values(monthCat).reduce((a,b)=>a+b,0) || 1;

  const barColors = {
    'LLM':'#5548d9','개발AI':'#1d9e75','영상AI':'#ef9f27',
    '이미지·디자인AI':'#d85a30','콘텐츠':'#d4537e','논문':'#639922',
    'AI법률':'#ba7517','비즈니스':'#888780'
  };

  // 주간 키워드 상위
  const kws = data.keywords || [];
  const maxKw = kws[0] ? kws[0].count : 1;

  const prose = data.period_prose || '';

  let html = `
    <!-- 요약 -->
    <div class="summary-card" style="margin-bottom:20px">
      <div class="summary-label">전체 흐름 요약 · 최근 ${data.days||7}일</div>
      <div class="prose-text">${escHtml(prose)}</div>
    </div>

    <!-- 키워드 관심도 -->
    <div class="sec-title">키워드 관심도 (최근 ${data.days||7}일)</div>
    <div class="trend-bars" style="margin-bottom:20px">
      ${kws.slice(0,10).map(k => {
        const pct = Math.round(k.count/maxKw*100);
        return `
          <div class="trend-bar-row">
            <div class="trend-bar-label">
              <span class="trend-bar-name">${escHtml(k.keyword)}</span>
              <span class="trend-bar-val" style="color:var(--accent)">${k.count}건</span>
            </div>
            <div class="trend-bar-bg">
              <div class="trend-bar-fill" style="width:${pct}%;background:var(--accent)"></div>
            </div>
          </div>`;
      }).join('')}
    </div>`;

  // 카테고리 비중 + 월간 대비 변화
  if (Object.keys(catStats).length) {
    html += `<div class="sec-title">카테고리별 비중 변화</div>
    <div class="change-grid" style="margin-bottom:20px">
      ${Object.entries(catStats).sort((a,b)=>b[1]-a[1]).map(([cat, cnt]) => {
        const wPct = Math.round(cnt/total*100);
        const mPct = monthCat[cat] ? Math.round(monthCat[cat]/mTotal*100) : null;
        const delta = mPct !== null ? wPct - mPct : null;
        const deltaHtml = delta !== null
          ? `<span class="change-delta ${delta>0?'delta-up':delta<0?'delta-down':'delta-flat'}">
               ${delta>0?'▲':'▼'} 월간 대비 ${Math.abs(delta)}%p
             </span>`
          : '';
        const color = barColors[cat] || '#888780';
        return `
          <div class="change-cell">
            <div class="change-cat">${escHtml(cat)}</div>
            <div class="change-pct" style="color:${color}">${wPct}%</div>
            ${deltaHtml}
          </div>`;
      }).join('')}
    </div>`;
  }

  // 일별 수집량 타임라인
  const timeline = data.daily_timeline || [];
  if (timeline.length > 1) {
    const maxC = Math.max(...timeline.map(d=>d.count)) || 1;
    html += `<div class="sec-title">일별 수집 현황</div>
    <div class="trend-bars">
      ${timeline.slice(-14).map(d => {
        const pct = Math.round(d.count/maxC*100);
        return `
          <div class="trend-bar-row">
            <div class="trend-bar-label">
              <span class="trend-bar-name" style="font-family:var(--mono);font-size:11px">${d.date}</span>
              <span class="trend-bar-val" style="color:var(--text-sub)">${d.count}건</span>
            </div>
            <div class="trend-bar-bg">
              <div class="trend-bar-fill" style="width:${pct}%;background:var(--teal)"></div>
            </div>
          </div>`;
      }).join('')}
    </div>`;
  }

  el.innerHTML = html;
}

// ═══════════════════════════════════════════
// 일별 리포트 모달
// ═══════════════════════════════════════════
async function openDayReport(date) {
  const modal = document.getElementById('reportModal');
  const title = document.getElementById('modalTitle');
  const body  = document.getElementById('modalBody');

  title.textContent = date + ' 리포트';
  body.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  modal.classList.add('open');

  try {
    const data = await fetchJSON(DATA_ROOT + 'history/' + date + '.json');
    const s = data.daily_summary || {};
    const kps = s.key_points || [];
    const items = (data.items || []).slice(0, 20);

    body.innerHTML = `
      ${kps.length ? `
        <div class="sec-title" style="margin-top:0">핵심 인사이트</div>
        <div class="summary-card" style="margin-bottom:16px">
          <ul class="insight-list">${kps.map(k=>`<li>${escHtml(k)}</li>`).join('')}</ul>
        </div>` : ''}
      <div class="sec-title">수집 뉴스 (상위 20건)</div>
      <div class="hot-list">
        ${items.map((item, i) => `
          <div class="hot-item">
            <div class="hot-rank">${String(i+1).padStart(2,'0')}</div>
            <div class="hot-content">
              <div class="hot-title">${escHtml(item.one_line_kr||item.title||'')}</div>
              <div class="hot-meta">${escHtml(item.source||'')} · ${escHtml((item.date||'').slice(0,10))}</div>
            </div>
            ${item.url?`<a href="${escHtml(item.url)}" target="_blank" style="font-size:11px;color:var(--accent);text-decoration:none">→</a>`:''}
          </div>`).join('')}
      </div>`;
  } catch(e) {
    body.innerHTML = `<div class="error-box">이 날의 데이터를 불러오지 못했어요. (${e.message})</div>`;
  }
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('reportModal')) {
    document.getElementById('reportModal').classList.remove('open');
  }
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
