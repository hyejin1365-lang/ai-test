<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 트렌드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ══ 헤더 ══════════════════════════════════════════════ -->
<header id="siteHeader">
  <div class="hd-inner">
    <div class="hd-brand">
      <div class="hd-icon">✦</div>
      <div>
        <div class="hd-title">AI 트렌드</div>
        <div class="hd-sub" id="updateTime">로딩 중…</div>
      </div>
    </div>
    <div class="hd-right">
      <button class="hd-theme-btn" id="themeBtn" title="다크모드">🌙</button>
    </div>
  </div>

  <!-- 필터 바 — 참고앱 방식 -->
  <div class="filter-bar" id="filterBar">

    <!-- 소스 -->
    <div class="filter-group">
      <span class="filter-group-label">소스</span>
      <div class="filter-chips" id="sourceChips">
        <button class="fchip active" data-filter="source" data-val="전체">전체</button>
      </div>
    </div>

    <!-- 기간 -->
    <div class="filter-group">
      <span class="filter-group-label">기간</span>
      <div class="filter-chips">
        <button class="fchip active" data-filter="period" data-val="전체">전체</button>
        <button class="fchip" data-filter="period" data-val="오늘">오늘</button>
        <button class="fchip" data-filter="period" data-val="이번주">이번주</button>
        <button class="fchip" data-filter="period" data-val="이번달">이번달</button>
      </div>
    </div>

    <!-- 분류 -->
    <div class="filter-group">
      <span class="filter-group-label">분류</span>
      <div class="filter-chips">
        <button class="fchip active" data-filter="type" data-val="전체">전체</button>
        <button class="fchip" data-filter="type" data-val="모델출시">모델출시</button>
        <button class="fchip" data-filter="type" data-val="API변경">API변경</button>
        <button class="fchip" data-filter="type" data-val="기능추가">기능추가</button>
        <button class="fchip" data-filter="type" data-val="가격변경">가격변경</button>
        <button class="fchip" data-filter="type" data-val="도구출시">도구출시</button>
      </div>
    </div>

    <!-- 정렬 / 보기 -->
    <div class="filter-group filter-group-right">
      <div class="filter-chips">
        <button class="fchip active" data-filter="sort" data-val="latest">최신순</button>
        <button class="fchip" data-filter="sort" data-val="hot">관심도순 🔥</button>
      </div>
      <label class="minor-toggle">
        <input type="checkbox" id="minorToggle"> 마이너 포함
      </label>
      <div class="view-btns">
        <button class="view-btn active" id="viewCard" title="카드 보기">📋 카드</button>
        <button class="view-btn" id="viewList" title="리스트 보기">📝 리스트</button>
      </div>
    </div>

  </div>
</header>

<!-- ══ 메인 ══════════════════════════════════════════════ -->
<main id="mainContent">

  <!-- 결과 카운트 -->
  <div class="result-bar">
    <span id="resultCount">로딩 중…</span>
  </div>

  <!-- 로딩 -->
  <div class="skeleton-wrap" id="loadingSkeleton">
    <div class="skeleton-row"></div>
    <div class="skeleton-row"></div>
    <div class="skeleton-row"></div>
    <div class="skeleton-row"></div>
    <div class="skeleton-row"></div>
  </div>

  <!-- 에러 -->
  <div class="error-card" id="errorBox" style="display:none">
    <i>⚠️</i>
    <div><strong>데이터를 불러오지 못했어요</strong><pre id="errorMsg"></pre></div>
  </div>

  <!-- 카드 뷰 -->
  <div class="card-grid" id="cardGrid"></div>

  <!-- 리스트 뷰 -->
  <div class="news-list" id="newsList" style="display:none"></div>

</main>

<!-- ══ 푸터 ══════════════════════════════════════════════ -->
<footer class="site-footer">
  AI 트렌드 · 매일 자동 수집 · RSS + 공식 Changelog
</footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="app.js"></script>
</body>
</html>
